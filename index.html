<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGT Scanner v1.2</title>
  <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; background: #0a0a0a; color: #00d4ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; }
    .container { width: 90%; max-width: 420px; border: 1px solid #00d4ff; padding: 24px; background: rgba(0, 212, 255, 0.05); border-radius: 10px; text-align: center; }
    #preview { width: 100%; border-radius: 8px; background: black; min-height: 300px; }
    #output { margin-top: 18px; font-weight: bold; white-space: pre-line; }
    .btn { width: 100%; margin-top: 10px; padding: 15px; border: 1px solid #00d4ff; background: transparent; color: #00d4ff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    #user-display { font-size: 0.8rem; margin-bottom: 10px; color: #ffaa00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SGT_SCAN_v1.2</h1>
    <div id="user-display">Checking operator...</div>
    <video id="preview" playsinline muted></video>
    <div id="output">SYSTEM_READY...</div>
    <button class="btn" id="start-btn">📷 ACTIVATE CAMERA</button>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyvyogNUThpdxws_H8fcLEEaJ4W6Do_sXFq62eX7tmkZd6qhG1U2TKSryTVxCjGSeYs/exec";
    const output = document.getElementById("output");
    const startBtn = document.getElementById("start-btn");
    const previewVideo = document.getElementById("preview");
    const userDisplay = document.getElementById("user-display");
    
    let codeReader = new ZXing.BrowserMultiFormatReader();
    let scannerStarted = false;
    let operatorName = localStorage.getItem("sgt_operator");

    if (!operatorName) {
      operatorName = prompt("Enter your name (Operator):");
      localStorage.setItem("sgt_operator", operatorName);
    }
    userDisplay.innerHTML = "OPERATOR: " + operatorName.toUpperCase();

    async function startScanner() {
      try {
        startBtn.innerHTML = "⏳ LOADING...";
        await codeReader.decodeFromVideoDevice(undefined, 'preview', (result) => {
          if (result) handleScan(result.getText());
        });
        scannerStarted = true;
        startBtn.innerHTML = "🔴 STOP CAMERA";
        output.innerHTML = "✅ CAMERA ACTIVE";
        output.style.color = "#22ff88";
      } catch (err) {
        output.innerHTML = "❌ CAMERA ERROR: " + err.message;
        startBtn.innerHTML = "📷 ACTIVATE CAMERA";
      }
    }

    async function handleScan(code) {
      codeReader.reset();
      output.innerHTML = "⏳ PROCESSING...";
      output.style.color = "#00d4ff";

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: JSON.stringify({ ticketCode: code, operator: operatorName })
        });
        const res = await response.json();
        if (res.result === "valid") {
          output.innerHTML = "✅ ACCESS GRANTED\n" + res.name;
          output.style.color = "#22ff88";
        } else {
          output.innerHTML = "❌ " + (res.message || "INVALID");
          output.style.color = "#ff2d55";
        }
      } catch (err) { output.innerHTML = "❌ SYNC ERROR"; }
      
      setTimeout(() => { startBtn.innerHTML = "📷 SCAN AGAIN"; scannerStarted = false; }, 3000);
    }

    startBtn.addEventListener("click", () => {
      if (scannerStarted) { codeReader.reset(); scannerStarted = false; startBtn.innerHTML = "📷 ACTIVATE CAMERA"; }
      else { startScanner(); }
    });
  </script>
</body>
</html>
